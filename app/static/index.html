<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Symphony | Multi-Engine Generative Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .engine-select {
            width: 100%;
            padding: 0.8rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            margin-bottom: 1.5rem;
            outline: none;
        }
        .piano-roll {
            width: 100%;
            border-radius: 8px;
            margin-top: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container glass-panel" style="max-width: 600px;">
        <header>
            <h1>AI Symphony Lab</h1>
            <p>Transformer, GAN, and Magenta Integrations</p>
        </header>
        
        <main>
            <div class="control-group">
                <label for="engine">Generative Engine</label>
                <select id="engine" class="engine-select">
                    <option value="lstm">LSTM + Attention (Default)</option>
                    <option value="transformer">Music Transformer Decoder</option>
                    <option value="gan">Sequence GAN</option>
                    <option value="magenta">Google Magenta (MusicVAE)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="temperature">Creativity (Temperature)</label>
                <div class="slider-wrapper">
                    <input type="range" id="temperature" min="0.1" max="2.0" step="0.1" value="1.0">
                    <span id="temp-val" class="value-display">1.0</span>
                </div>
            </div>
            
            <div class="control-group">
                <label for="length">Sequence Length (Notes)</label>
                <div class="slider-wrapper">
                    <input type="range" id="length" min="100" max="1000" step="50" value="500">
                    <span id="length-val" class="value-display">500</span>
                </div>
            </div>
            
            <button id="generate-btn" class="btn-primary">
                <span class="btn-text">Generate Masterpiece</span>
                <div class="loader hidden" id="loader"></div>
            </button>
            
            <div id="status-message" class="status hidden"></div>
            
            <div id="result-section" class="result hidden">
                <h3>Your Composition is Ready!</h3>
                <img id="piano-roll-img" class="piano-roll hidden" src="" alt="Piano Roll Visualization">
                <a id="download-link" class="btn-secondary" href="#" download>Download MIDI</a>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
